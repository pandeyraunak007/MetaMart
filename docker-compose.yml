services:
  postgres:
    image: postgres:16-alpine
    container_name: metamart-postgres
    environment:
      POSTGRES_USER: metamart
      POSTGRES_PASSWORD: metamart
      POSTGRES_DB: metamart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metamart"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: metamart-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
